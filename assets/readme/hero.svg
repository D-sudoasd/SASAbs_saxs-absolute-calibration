<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">saxsabs / SAXSAbs Workbench</title>
  <desc id="desc">SAXS absolute intensity calibration with multi-standard K-factor estimation and provenance gates.</desc>
  <rect width="1200" height="360" rx="26" fill="#12100C"/>
  <path d="M0 54H1200M700 0V360" stroke="#2A241C"/>
  <g transform="translate(56 40)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
