name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        run: ruff check src tests
      - name: Pytest
        run: pytest -q --tb=short

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Build release notes header from CITATION.cff
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          citation = Path("CITATION.cff").read_text(encoding="utf-8")
          match = re.search(r"^\s*value:\s*([0-9]+\.[0-9]+/\S+)\s*$", citation, re.MULTILINE)
          if not match:
              raise SystemExit("No DOI value found in CITATION.cff")

          doi_url = f"https://doi.org/{match.group(1)}"
          Path("release-body.md").write_text(
              "Archived release DOI: "
              f"{doi_url}\n\n"
              "Use this DOI when citing this specific software release.\n",
              encoding="utf-8",
          )
          PY
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          body_path: release-body.md
          generate_release_notes: true
